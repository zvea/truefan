# Netdata alert config for TrueFan.
# Setup: truefan netdata install

template: truefan_recent_restart
on: truefan.uptime
lookup: min -10s
units: seconds
every: 10s
warn: $this < 900
delay: down 5m
summary: TrueFan daemon restarted recently
info: Daemon uptime is below 15 minutes, indicating a recent restart.
to: sysadmin

template: truefan_fan_stall
on: truefan.stalls
lookup: max -60s
units: events
every: 10s
warn: $this > 0
delay: down 5m
summary: Fan stall detected
info: A fan stalled and truefan removed its lowest setpoint to recover.
to: sysadmin

template: truefan_crash_loop
on: truefan.restarts
lookup: incremental_sum -1h
units: events
every: 10s
warn: $this > 1
crit: $this > 3
delay: down 10m
summary: TrueFan daemon restarting repeatedly
info: Multiple daemon restarts in the last hour suggest a crash loop.
to: sysadmin

template: truefan_not_reporting
on: truefan.uptime
lookup: incremental_sum -60s of uptime
units: seconds
every: 10s
# Netdata statsd synthetic charts repeat the last gauge value forever
# instead of producing NaN, so we detect staleness by checking whether
# uptime is still increasing.
crit: $this == 0
delay: up 60s down 5m
summary: TrueFan daemon is not reporting
info: Daemon uptime is not increasing. The daemon may have stopped or crashed.
to: sysadmin
