# Netdata alert config for TrueFan.
# Setup: sudo ./setup.sh parent  (or standalone)

template: truefan_recent_restart
on: truefan.uptime
lookup: min -10s
units: seconds
every: 10s
warn: $this != nan AND $this < 900
delay: down 5m
summary: TrueFan daemon restarted recently
info: Daemon uptime is below 15 minutes, indicating a recent restart.
to: sysadmin

template: truefan_not_reporting
on: truefan.uptime
lookup: min -10s
units: seconds
every: 10s
crit: $this == nan
delay: down 5m
summary: TrueFan daemon is not reporting
info: No uptime metrics received. The daemon may have stopped or crashed.
to: sysadmin
