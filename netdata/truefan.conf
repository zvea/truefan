# Netdata statsd app config for TrueFan.
# Install into the Netdata container and restart:
#   docker cp truefan.conf ix-netdata-netdata-1:/etc/netdata/statsd.d/
#   docker restart ix-netdata-netdata-1

[app]
	name = TrueFan
	metrics = truefan.*
	private charts = no
	gaps when not collected = no

[target_rpm]
	name = target_rpm
	title = Fan Target RPM
	family = fans
	context = truefan.target_rpm
	units = RPM
	type = line
	dimension = pattern 'truefan.fan.*.target_rpm' '' last 1 1

[zone_duty]
	name = zone_duty
	title = Fan Zone Duty Cycle
	family = zones
	context = truefan.zone_duty
	units = %
	type = line
	dimension = pattern 'truefan.zone.*.duty' '' last 1 1

[thermal_load]
	name = thermal_load
	title = Sensor Thermal Load
	family = sensors
	context = truefan.thermal_load
	units = %
	type = line
	dimension = pattern 'truefan.sensor.*.thermal_load' '' last 1 1

[restarts]
	name = restarts
	title = Daemon Restarts
	family = daemon
	context = truefan.restarts
	units = events
	type = line
	dimension = truefan.daemon.restarts restarts last 1 1
